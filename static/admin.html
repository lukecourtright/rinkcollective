<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RinkCollective — Admin Console</title>
<link rel="icon" href="/static/logo/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/brand-tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body { font-family: var(--font-body); color: var(--text); -webkit-font-smoothing: antialiased; }
  a { color: #07C8C8; text-decoration: none; }
  input, textarea, button { font-family: inherit; }
  input::placeholder, textarea::placeholder { color: #4B5168; }
  input:focus, textarea:focus { outline: none; border-color: var(--color-primary) !important; box-shadow: 0 0 0 3px rgba(20,207,207,0.12); }
  button { cursor: pointer; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }

  #app { display: flex; min-height: 100vh; background: var(--bg); }

  /* ---------- sidebar ---------- */
  #sidebar-scrim { position: fixed; inset: 0; background: rgba(5,7,15,0.6); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
  #sidebar-scrim.open { opacity: 1; pointer-events: auto; }
  #sidebar { width: 240px; flex-shrink: 0; background: #0E1322; border-right: 1px solid var(--hair); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 200; }
  .sb-header { display: flex; align-items: center; gap: 10px; padding: 18px 18px 16px; border-bottom: 1px solid var(--hair); flex-shrink: 0; }
  .sb-mark { width: 32px; height: 32px; border-radius: 9px; background: rgba(20,207,207,0.1); border: 1px solid rgba(20,207,207,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sb-word { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.02em; }
  .sb-eyebrow { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #07C8C8; margin-top: 2px; }
  .sb-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .sb-label { font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #4B5168; padding: 6px 10px 8px; }
  .nav-item { display: flex; align-items: center; gap: 11px; padding: 9px 10px; border-radius: 9px; background: none; border: none; color: var(--text-muted); font-size: 13.5px; font-weight: 500; width: 100%; text-align: left; }
  .nav-item .ic { font-size: 18px; color: #656C84; display: flex; }
  .nav-item.active { background: rgba(20,207,207,0.1); color: var(--color-primary); font-weight: 600; }
  .nav-item.active .ic { color: var(--color-primary); }
  .nav-badge { margin-left: auto; background: #FFC83D; color: #2A1F00; font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; border-radius: 20px; padding: 1px 7px; }
  .sb-footer { padding: 12px; border-top: 1px solid var(--hair); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .sb-avatar { width: 34px; height: 34px; border-radius: 9px; background: linear-gradient(135deg,#14CFCF,#07C8C8); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: #06181A; flex-shrink: 0; }
  .sb-logout { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: #888FA8; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .sb-logout:hover { background: rgba(255,107,125,0.1); border-color: rgba(255,107,125,0.3); color: #FF6B7D; }

  /* ---------- main / topbar ---------- */
  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  #topbar { height: 60px; flex-shrink: 0; background: rgba(10,14,26,0.82); backdrop-filter: blur(10px); border-bottom: 1px solid var(--hair); display: flex; align-items: center; gap: 14px; padding: 0 24px; position: sticky; top: 0; z-index: 120; }
  #hamburger-btn { display: none; background: none; border: none; padding: 6px; }
  .page-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .page-subtitle { font-size: 12px; color: #656C84; margin-top: 1px; }
  .synced-chip { display: flex; align-items: center; gap: 7px; padding: 5px 11px; background: rgba(52,224,160,0.09); border: 1px solid rgba(52,224,160,0.25); border-radius: 20px; margin-left: auto; }
  .synced-dot { width: 7px; height: 7px; border-radius: 50%; background: #34E0A0; box-shadow: 0 0 8px rgba(52,224,160,0.7); }
  #content { flex: 1; overflow-y: auto; padding: 26px 24px 60px; }
  .content-inner { max-width: 1160px; margin: 0 auto; }

  /* ---------- overview ---------- */
  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 18px 16px; }
  .stat-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .stat-icon-wrap { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .stat-delta { font-family: var(--font-mono); font-size: 10.5px; }
  .stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
  .stat-label { font-size: 12.5px; color: #888FA8; margin-top: 3px; }
  .split { display: grid; grid-template-columns: 1.25fr 1fr; gap: 16px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .panel-head { display: flex; align-items: center; padding: 15px 18px; border-bottom: 1px solid var(--hair); }
  .panel-title { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text); }
  .panel-link { margin-left: auto; background: none; border: none; color: #07C8C8; font-size: 12.5px; font-weight: 600; }
  .pending-row { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid #171F33; }
  .pending-thumb { width: 52px; height: 52px; border-radius: 9px; background-size: cover; background-position: center; background-color: #0E1322; border: 1px solid var(--border); flex-shrink: 0; padding: 0; }
  .pending-name { font-size: 13.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pending-meta { font-size: 12px; color: #656C84; margin-top: 2px; }
  .icon-btn { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid; flex-shrink: 0; }
  .icon-btn.approve { background: rgba(52,224,160,0.12); border-color: rgba(52,224,160,0.3); color: #34E0A0; }
  .icon-btn.reject { background: rgba(255,107,125,0.1); border-color: rgba(255,107,125,0.28); color: #FF6B7D; }
  .empty-note { padding: 34px 18px; text-align: center; color: #656C84; font-size: 13px; }
  .activity-row { display: flex; gap: 12px; padding: 11px 18px; border-bottom: 1px solid #171F33; }
  .activity-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .activity-text { font-size: 13px; color: #D0D6E6; line-height: 1.4; }
  .activity-time { font-family: var(--font-mono); font-size: 10.5px; color: #4B5168; margin-top: 2px; }

  /* ---------- tabs / search ---------- */
  .tabs { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .tab-btn { padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 500; }
  .tab-btn.active { background: rgba(20,207,207,0.1); border-color: var(--color-primary); color: var(--color-primary); font-weight: 600; }
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 380px; }
  .search-wrap .ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: #4B5168; display: flex; }
  .search-wrap input { width: 100%; height: 40px; padding: 0 14px 0 38px; background: #0E1322; border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 13.5px; }
  .count-label { font-family: var(--font-mono); font-size: 12px; color: #656C84; margin-left: auto; }

  /* ---------- photo queue ---------- */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(268px, 1fr)); gap: 14px; }
  .photo-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
  .photo-thumb-btn { height: 158px; background-size: cover; background-position: center; background-color: #0E1322; border: none; border-bottom: 1px solid var(--hair); position: relative; padding: 0; }
  .type-badge { border-radius: 20px; padding: 3px 9px; font-size: 10.5px; font-weight: 600; }
  .thumb-badge { position: absolute; top: 10px; left: 10px; }
  .thumb-eye { position: absolute; top: 10px; right: 10px; background: rgba(10,14,26,0.75); backdrop-filter: blur(4px); border-radius: 7px; padding: 4px 7px; font-size: 15px; color: var(--text); display: flex; }
  .photo-body { padding: 13px 15px; flex: 1; display: flex; flex-direction: column; }
  .photo-rink { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .photo-city { font-size: 12px; color: #888FA8; margin-top: 3px; }
  .submitter-row { display: flex; align-items: center; gap: 8px; margin-top: 11px; padding-top: 11px; border-top: 1px solid var(--hair); }
  .av-chip { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10.5px; font-weight: 700; color: #06181A; flex-shrink: 0; }
  .submitter-name { font-size: 12px; color: #D0D6E6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .photo-footer { margin-top: 12px; display: flex; gap: 8px; }
  .btn-approve { flex: 1; height: 36px; border-radius: 8px; background: rgba(52,224,160,0.12); border: 1px solid rgba(52,224,160,0.32); color: #34E0A0; font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .btn-reject { flex: 1; height: 36px; border-radius: 8px; background: rgba(255,107,125,0.1); border: 1px solid rgba(255,107,125,0.3); color: #FF6B7D; font-size: 12.5px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .status-pill { display: flex; align-items: center; justify-content: center; gap: 6px; height: 36px; border-radius: 8px; font-size: 12.5px; font-weight: 600; background: rgba(52,224,160,0.1); color: #34E0A0; }
  .dashed-empty { background: var(--surface); border: 1px dashed var(--border); border-radius: 14px; padding: 56px 20px; text-align: center; }

  /* ---------- tables ---------- */
  .data-table { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .table-head { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #656C84; padding: 12px 18px; background: #0E1322; display: grid; gap: 10px; border-bottom: 1px solid var(--hair); }
  .table-row { display: grid; gap: 10px; align-items: center; padding: 14px 18px; border-bottom: 1px solid #171F33; }
  .table-row:last-child { border-bottom: none; }
  #users-table .table-head, #users-table .table-row { grid-template-columns: 1.5fr 1.6fr 0.9fr 0.7fr 0.9fr; }
  #rinks-table .table-head, #rinks-table .table-row { grid-template-columns: 1.7fr 0.8fr 0.9fr 1.5fr auto; }
  .cell-member { display: flex; align-items: center; gap: 11px; min-width: 0; }
  .cell-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #06181A; flex-shrink: 0; }
  .cell-name { font-size: 13.5px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell-muted { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cell-mono { font-family: var(--font-mono); font-size: 12px; color: #888FA8; }
  .role-pill { font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .pager { display: flex; align-items: center; justify-content: center; gap: 14px; padding: 14px; border-top: 1px solid var(--hair); }
  .pager button { background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; padding: 6px 12px; font-size: 12.5px; }
  .pager button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pager span { font-family: var(--font-mono); font-size: 12px; color: #656C84; }
  .edit-btn { height: 32px; padding: 0 13px; border-radius: 8px; background: rgba(20,207,207,0.1); border: 1px solid rgba(20,207,207,0.3); color: var(--color-primary); font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

  /* ---------- activity log ---------- */
  .activity-log-row { display: flex; align-items: center; gap: 12px; padding: 13px 18px; border-bottom: 1px solid #171F33; }
  .activity-log-row:last-child { border-bottom: none; }
  .activity-icon { width: 34px; height: 34px; border-radius: 9px; border: 1px solid; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }

  /* ---------- rink editor drawer ---------- */
  #editor-scrim { position: fixed; inset: 0; background: rgba(5,7,15,0.55); z-index: 1300; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; }
  #editor-scrim.open { opacity: 1; pointer-events: auto; }
  #editor-drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 440px; background: var(--bg); border-left: 1px solid var(--border); box-shadow: -8px 0 40px rgba(0,0,0,0.55); z-index: 1301; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s ease; }
  #editor-drawer.open { transform: translateX(0); }
  .editor-head { display: flex; align-items: center; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--hair); flex-shrink: 0; }
  .editor-eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #07C8C8; }
  .editor-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--text); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .editor-close { margin-left: auto; width: 34px; height: 34px; border-radius: 8px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .editor-body { flex: 1; overflow-y: auto; padding: 20px; }
  .field-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .field-input { width: 100%; height: 40px; padding: 0 13px; background: #0E1322; border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 13.5px; margin-bottom: 16px; }
  .field-textarea { width: 100%; padding: 10px 13px; background: #0E1322; border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 13.5px; resize: vertical; line-height: 1.4; margin-bottom: 16px; }
  .section-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #4B5168; margin: 22px 0 12px; }
  .type-seg { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
  .type-opt { padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 12.5px; font-weight: 600; }
  .day-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .day-label { width: 38px; font-size: 12.5px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; }
  .day-input { flex: 1; min-width: 0; height: 36px; padding: 0 10px; background: #0E1322; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12.5px; }
  .day-closed-btn { flex-shrink: 0; height: 36px; padding: 0 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: #656C84; font-size: 11px; font-weight: 600; }
  .editor-footer { display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--hair); flex-shrink: 0; background: #0E1322; }
  .btn-cancel { flex: 1; height: 42px; border-radius: 9px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-size: 13.5px; font-weight: 600; }
  .btn-save { flex: 1.6; height: 42px; border-radius: 9px; background: var(--color-primary); border: none; color: #06181A; font-size: 13.5px; font-weight: 700; }

  /* ---------- modals ---------- */
  .modal-scrim { position: fixed; inset: 0; background: rgba(5,7,15,0.7); backdrop-filter: blur(4px); z-index: 1400; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .reject-modal { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; width: 440px; max-width: 100%; padding: 20px; }
  .reason-chips { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }
  .reason-chip { padding: 6px 11px; border-radius: 20px; background: #0E1322; border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; }
  .photo-modal { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; width: 520px; max-width: 100%; max-height: 92vh; overflow-y: auto; }
  .photo-modal-hero { height: 340px; background-size: cover; background-position: center; background-color: #0E1322; border-radius: 16px 16px 0 0; position: relative; }
  .photo-modal-close { position: absolute; top: 12px; right: 12px; width: 36px; height: 36px; border-radius: 9px; background: rgba(10,14,26,0.7); backdrop-filter: blur(4px); border: 1px solid var(--border); color: var(--text); display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .meta-strip { display: flex; gap: 22px; margin: 16px 0 18px; padding: 14px 0; border-top: 1px solid var(--hair); border-bottom: 1px solid var(--hair); }
  .meta-eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #4B5168; }

  /* ---------- toast ---------- */
  #toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); display: flex; align-items: center; gap: 9px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px; padding: 11px 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 1500; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .denied-wrap { max-width: 420px; margin: 80px auto; text-align: center; padding: 0 20px; }
  .denied-wrap h1 { font-family: var(--font-display); font-size: 20px; margin-bottom: 10px; }
  .denied-wrap p { color: var(--text-muted); font-size: 14px; line-height: 1.5; }

  /* ---------- campaigns: list ---------- */
  .camp-back-btn { width: 34px; height: 34px; border-radius: 9px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .btn-primary { height: 40px; padding: 0 16px; border-radius: 9px; background: var(--color-primary); border: none; color: #06181A; font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
  #campaigns-table .table-head, #campaigns-table .table-row { grid-template-columns: 2.2fr 1.2fr 1fr 0.7fr 0.7fr; }
  .camp-name-cell { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .camp-type-well { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .badge-auto { border: 1px solid rgba(52,224,160,0.4); color: #34E0A0; font-family: var(--font-mono); font-size: 9.5px; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 20px; padding: 1px 7px; margin-left: 7px; }
  .camp-sub { font-family: var(--font-mono); font-size: 11px; color: #656C84; margin-top: 2px; }
  .camp-status-pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .camp-mono-right { font-family: var(--font-mono); font-size: 12.5px; text-align: right; }

  /* ---------- campaigns: series ---------- */
  .camp-header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .camp-toggle-wrap { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .camp-toggle { width: 46px; height: 26px; border-radius: 20px; background: var(--border); border: none; position: relative; flex-shrink: 0; transition: background 0.2s ease; }
  .camp-toggle.on { background: #34E0A0; }
  .camp-toggle .knob { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform 0.2s ease; }
  .camp-toggle.on .knob { transform: translateX(20px); }
  .camp-toggle-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; color: #656C84; }
  .flow-wrap { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 10px 4px 16px; transition: opacity 0.25s ease; }

const NAV_ITEMS = [

const PAGE_META = {
  overview: ['Overview', 'Day-to-day snapshot of the site'],
  photos: ['Photo Queue', 'Review community-submitted rink photos'],
  users: ['Users', 'Search the member directory'],
  rinks: ['Rinks', 'Search and edit rink listings'],

const REASON_CHIPS = ['Blurry / low quality', 'Not this rink', 'Duplicate', 'Inappropriate'];
const CAMPAIGN_STATUS_STYLE = {
  active: { label: 'Active', bg: 'rgba(52,224,160,0.12)', color: '#34E0A0' },
  paused: { label: 'Paused', bg: 'rgba(136,143,168,0.12)', color: '#888FA8' },
  sent: { label: 'Sent', bg: 'rgba(20,207,207,0.12)', color: '#14CFCF' },

};
const ACTIVITY_LABELS = { active: 'Active (90d)', inactive: 'Inactive', all: 'All members' };
const ICONS = {
  grid: '<path d="M4 4h6v6H4zM14 4h6v6h-6zM14 14h6v6h-6zM4 14h6v6H4z"/>',
  image: '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>',
  users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  rink: '<path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 8h.01M15 8h.01M9 12h.01M15 12h.01M9 16h.01M15 16h.01"/>',

  check: '<path d="M20 6L9 17l-5-5"/>',

  send: '<path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/>',
  clock: '<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
  userPlus: '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><path d="M20 8v6M23 11h-6"/>',
  beaker: '<path d="M9 3h6M10 3v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-2.5L14 9V3"/>',
  arrowLeft: '<path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>',
  plus: '<path d="M12 5v14M5 12h14"/>',
  link: '<path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11.5 4.5"/><path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L12.5 19.5"/>',
  desktop: '<rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>',

  copy: '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>',
};
function shortDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function pct(n) { return n == null ? '—' : `${n}%`; }
function icon(name, sw) {
  return `<svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||2}" stroke-linecap="round" stroke-linejoin="round" style="display:block;">${ICONS[name]||''}</svg>`;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : s; return d.innerHTML; }
function initials(name) { return (name||'?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(); }
function seedOf(str) { let h = 0; for (const c of String(str)) h = (h * 31 + c.charCodeAt(0)) >>> 0; return h; }
function avColor(str) { return AV_COLORS[seedOf(str) % AV_COLORS.length]; }
function typeBadge(t) { const info = TYPE_INFO[t] || TYPE_INFO.STANDARD; return `<span class="type-badge" style="background:${info.bg};border:1px solid ${info.color}40;color:${info.color};">${info.label}</span>`; }
function relTime(iso) {
  if (!iso) return '';
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.round(hrs / 24);
  if (days < 30) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}

class Admin {
  constructor() {
    this.state = {
      ready: false, denied: null, currentUser: null,
      view: 'overview', isNarrow: window.matchMedia('(max-width: 900px)').matches, drawerOpen: false,

      overview: null,

      photoFilter: 'pending', photoCounts: { pending: 0, approved: 0 }, photos: [],
      photoModalId: null, rejectForId: null, rejectReason: '',

      users: [], usersTotal: 0, usersPage: 1, userSearch: '',
      rinks: [], rinksTotal: 0, rinksPage: 1, rinkSearch: '',

      editRinkId: null, rinkDraft: null,
      rinkAdmins: [], rinkAdminEmailInput: '', rinkAdminError: '',

      activity: [],

      campaignsFilter: 'all', campaignsList: [],
      campaignsView: 'list', campaignsSelId: null,
      campaignDetail: null, campaignReport: null,
      composeTarget: null, broadcastDraft: null, stepDraft: null,
      campaignModal: null, campaignDevice: 'desktop', campaignReach: null,
      campaignScheduleAt: '',

      toast: null,
    };
    this.init();
  }

  setState(partial) { Object.assign(this.state, partial); this.render(); }

  async api(path, opts) {
    const res = await fetch(path, opts);
    if (res.status === 401 || res.status === 403) {
      // Renders the denied screen right here so every caller — not just the
      // ones with a try/catch — surfaces a session that expired mid-use.
      this.state.denied = res.status;
      this.render();
      throw new Error('denied');
    }
    return res;
  }

  async init() {
    const meRes = await fetch('/api/auth/me');
    const me = await meRes.json();
    this.state.currentUser = me.user;

    const params = new URLSearchParams(location.search);
    const view = params.get('view');
    if (view && PAGE_META[view]) this.state.view = view;
    history.replaceState(null, '', '/admin');

    if (!me.user) {
      this.setState({ denied: 401, ready: true });
      return;
    }

    try {
      await this.loadOverview();
    } catch (e) {
      this.render();
      return;
    }
    this.state.ready = true;
    this.bindShell();
    await this.loadViewData(this.state.view);
    this.render();
  }

  bindShell() {
    const mq = window.matchMedia('(max-width: 900px)');
    const onMq = (e) => this.setState({ isNarrow: e.matches, drawerOpen: false });
    (mq.addEventListener ? mq.addEventListener.bind(mq, 'change', onMq) : mq.addListener.bind(mq, onMq))();
    document.getElementById('hamburger-btn').addEventListener('click', () => this.toggleDrawer());
    document.getElementById('sidebar-scrim').addEventListener('click', () => this.setState({ drawerOpen: false }));
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (this.state.photoModalId != null) this.closePhotoModal();
        else if (this.state.rejectForId != null) this.closeReject();
        else if (this.state.editRinkId != null) this.closeEditor();
        else if (this.state.campaignModal != null) this.closeCampaignModal();
        else if (this.state.drawerOpen) this.setState({ drawerOpen: false });
      }
    });
  }

  toggleDrawer() { this.setState({ drawerOpen: !this.state.drawerOpen }); }

  async setView(view) {
    this.setState({ view, drawerOpen: false });
    await this.loadViewData(view);
    this.render();
  }

  async loadViewData(view) {
    if (view === 'overview') return this.loadOverview();
    if (view === 'photos') return this.loadPhotos();
    if (view === 'users') return this.loadUsers();
    if (view === 'rinks') return this.loadRinks();
    if (view === 'activity') return this.loadActivity();
    if (view === 'campaigns') {
      this.state.campaignsView = 'list';
      this.state.campaignsSelId = null;
      this.state.campaignDetail = null;
      this.state.campaignReport = null;
      return this.loadCampaigns();
    }
  }

  async loadOverview() {
    const res = await this.api('/api/admin/overview');
    this.state.overview = await res.json();
    this.state.photoCounts.pending = this.state.overview.pendingPhotos;
  }

  async loadPhotos() {
    const res = await this.api(`/api/admin/photos?status=${this.state.photoFilter}`);
    const data = await res.json();
    this.state.photos = data.items;
    this.state.photoCounts = data.counts;
  }

  async loadUsers() {
    const q = encodeURIComponent(this.state.userSearch);
    const res = await this.api(`/api/admin/users?q=${q}&page=${this.state.usersPage}`);
    const data = await res.json();
    this.state.users = data.items;
    this.state.usersTotal = data.total;
  }

  async loadRinks() {
    const q = encodeURIComponent(this.state.rinkSearch);
    const res = await this.api(`/api/admin/rinks?q=${q}&page=${this.state.rinksPage}`);
    const data = await res.json();
    this.state.rinks = data.items;
    this.state.rinksTotal = data.total;
  }

  async loadActivity() {
    const res = await this.api('/api/admin/activity?limit=50');
    this.state.activity = await res.json();
  }

  // ---------- campaigns ----------
  async loadCampaigns() {
    const res = await this.api('/api/admin/campaigns');
    this.state.campaignsList = await res.json();
  }

  openCampaignRow(row) {
    if (row.kind === 'automation') return this.openSeries(row.id);
    if (row.status === 'sent') return this.openReport(row.id);
    return this.openCompose(row.id);
  }

  async openSeries(id) {
    const res = await this.api('/api/admin/automations/welcome-series');
    const detail = await res.json();
    this.setState({ campaignsView: 'series', campaignsSelId: detail.id, campaignDetail: detail, campaignModal: null });
  }

  async openReport(id) {
    const res = await this.api(`/api/admin/campaigns/${id}/report`);
    const data = await res.json();
    this.setState({ campaignsView: 'report', campaignsSelId: id, campaignDetail: data.campaign, campaignReport: data.report });
  }

  async openCompose(id) {
    const res = await this.api(`/api/admin/campaigns/${id}`);
    const campaign = await res.json();
    this.setState({
      campaignsView: 'compose', campaignsSelId: id, campaignModal: null,
      composeTarget: { type: 'broadcast', id }, broadcastDraft: JSON.parse(JSON.stringify(campaign)),
      campaignDevice: 'desktop', campaignReach: campaign.reach,
    });
  }

  openStepEditor(step) {
    this.setState({
      campaignsView: 'compose', composeTarget: { type: 'step', id: step.id },
      stepDraft: JSON.parse(JSON.stringify(step)), campaignDevice: 'desktop',
    });
  }

  async backToList() {
    this.setState({ campaignsView: 'list', campaignsSelId: null, campaignDetail: null, campaignReport: null, composeTarget: null });
    await this.loadCampaigns();
    this.render();
  }

  async backToSeries() {
    await this.openSeries(this.state.campaignDetail ? this.state.campaignDetail.id : null);
  }

  async toggleAutomation() {
    const next = !this.state.campaignDetail.active;
    await this.api('/api/admin/automations/welcome-series', {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ active: next }),
    });
    await this.openSeries();
  }

  async fetchReach(activity) {
    const res = await this.api(`/api/admin/campaigns/audience-count?activity=${activity}`);
    const data = await res.json();
    this.state.campaignReach = data.reach;
    const el = document.getElementById('reach-count');
    if (el) el.textContent = data.reach.toLocaleString();
    const warn = document.getElementById('reach-warn');
    if (warn) warn.style.display = data.reach === 0 ? 'inline' : 'none';
    const sendBtn = document.getElementById('send-now-btn');
    if (sendBtn) sendBtn.innerHTML = `${icon('send')}Send to ${data.reach.toLocaleString()}`;
  }

  async setActivitySegment(activity) {
    this.state.broadcastDraft.audienceActivity = activity;
    this.render();
    await this.fetchReach(activity);
    this.queueDraftSave();
  }

  updateDraftField(field, value) {
    this.state.broadcastDraft[field] = value;
    this.queueDraftSave();
  }

  queueDraftSave() {
    clearTimeout(this._draftSaveTimer);
    this._draftSaveTimer = setTimeout(() => this.saveDraftNow(), 500);
  }

  async saveDraftNow() {
    const d = this.state.broadcastDraft;
    if (!d || d.status !== 'draft') return;
    await this.api(`/api/admin/campaigns/${d.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: d.name, subject: d.subject, bodyHtml: d.bodyHtml, ctaUrl: d.ctaUrl, audienceActivity: d.audienceActivity }),
    });
    const el = document.getElementById('compose-saved-label');
    if (el) el.textContent = 'Draft · saved just now';
  }

  async saveStep() {
    const d = this.state.stepDraft;
    await this.api(`/api/admin/automations/welcome-series/steps/${d.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: d.subject, bodyHtml: d.bodyHtml }),
    });
    this.showToast('Step saved', '#34E0A0', 'check');
    await this.openSeries();
  }

  async sendTestEmail() {
    const target = this.state.composeTarget;
    if (target.type !== 'broadcast') return;
    await this.saveDraftNow();
    const res = await fetch(`/api/admin/campaigns/${target.id}/send-test`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.showToast(err.detail || 'Could not send test', '#FF6B7D', 'x');
      return;
    }
    const data = await res.json();
    this.showToast(`Test email queued to ${data.to}`, '#34E0A0', 'check');
  }

  async sendSeriesTest() {
    const firstStep = this.state.campaignDetail.steps[0];
    const res = await fetch(`/api/admin/automations/welcome-series/steps/${firstStep.id}/send-test`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.showToast(err.detail || 'Could not send test', '#FF6B7D', 'x');
      return;
    }
    const data = await res.json();
    this.showToast(`Test email queued to ${data.to}`, '#34E0A0', 'check');
  }

  async sendStepTest(stepId) {
    const res = await fetch(`/api/admin/automations/welcome-series/steps/${stepId}/send-test`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.showToast(err.detail || 'Could not send test', '#FF6B7D', 'x');
      return;
    }
    const data = await res.json();
    this.showToast(`Test email queued to ${data.to}`, '#34E0A0', 'check');
  }

  openScheduleModal() { this.setState({ campaignModal: 'schedule', campaignScheduleAt: '' }); }

  async confirmSchedule() {
    if (!this.state.campaignScheduleAt) return;
    await this.saveDraftNow();
    const iso = new Date(this.state.campaignScheduleAt).toISOString();
    const res = await fetch(`/api/admin/campaigns/${this.state.broadcastDraft.id}/schedule`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ scheduledAt: iso }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.showToast(err.detail || 'Could not schedule', '#FF6B7D', 'x');
      return;
    }
    this.setState({ campaignModal: null });
    await this.backToList();
    this.showToast('Broadcast scheduled', '#4FB8FF', 'check');
  }

  openSendConfirm() { this.setState({ campaignModal: 'send' }); }

  async confirmSend() {
    await this.saveDraftNow();
    const id = this.state.broadcastDraft.id;
    const res = await fetch(`/api/admin/campaigns/${id}/send`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.setState({ campaignModal: null });
      this.showToast(err.detail || 'Could not send', '#FF6B7D', 'x');
      return;
    }
    this.setState({ campaignModal: null });
    await this.openReport(id);
  }

  setDevice(device) {
    this.state.campaignDevice = device;
    const frame = document.getElementById('email-preview-frame');
    if (frame) frame.classList.toggle('mobile', device === 'mobile');
    document.querySelectorAll('[data-device]').forEach(b => b.classList.toggle('active', b.dataset.device === device));
  }

  openNewCampaignModal() { this.setState({ campaignModal: 'new' }); }
  closeCampaignModal() { this.setState({ campaignModal: null }); }

  async pickBroadcast() {
    const res = await this.api('/api/admin/campaigns', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: 'Untitled broadcast' }) });
    const campaign = await res.json();
    await this.openCompose(campaign.id);
  }

  async pickAutomation() {
    const automation = this.state.campaignsList.find(c => c.kind === 'automation');
    if (automation) await this.openSeries(automation.id);
    else this.setState({ campaignModal: null });
  }

  execToolbar(cmd) {
    const el = document.getElementById('body-editable');
    if (!el) return;
    el.focus();
    if (cmd === 'bold' || cmd === 'italic') { document.execCommand(cmd); }
    else if (cmd === 'quote') { document.execCommand('formatBlock', false, 'blockquote'); }
    else if (cmd === 'list') { document.execCommand('insertUnorderedList'); }
    else if (cmd === 'link') {
      const url = window.prompt('Link URL:', 'https://');
      if (url) document.execCommand('createLink', false, url);
    }
    this.onBodyInput(el);
  }

  insertMergeTag() {
    const el = document.getElementById('body-editable');
    if (!el) return;
    el.focus();
    document.execCommand('insertText', false, '[first_name]');
    this.onBodyInput(el);
  }

  insertCtaButton() {
    const el = document.getElementById('body-editable');
    if (!el) return;
    const label = window.prompt('Button label:', 'Find sessions near you');
    if (!label) return;
    const url = window.prompt('Button link (URL):', 'https://rinkcollective.com/rinks');
    if (!url) return;
    el.focus();
    document.execCommand('insertHTML', false, `<a href="${url}" style="display:inline-block;margin:14px 0;padding:11px 20px;background:#14CFCF;color:#06181A;font-weight:700;border-radius:8px;text-decoration:none;">${label}</a>`);
    if (this.state.composeTarget.type === 'broadcast') this.state.broadcastDraft.ctaUrl = url;
    this.onBodyInput(el);
  }

  onBodyInput(el) {
    const target = this.state.composeTarget;
    if (target.type === 'step') {
      this.state.stepDraft.bodyHtml = el.innerHTML;
    } else {
      this.state.broadcastDraft.bodyHtml = el.innerHTML;
      this.queueDraftSave();
    }
    const preview = document.getElementById('email-preview-body-content');
    if (preview) preview.innerHTML = el.innerHTML;
  }

  onSubjectInput(value) {
    const target = this.state.composeTarget;
    if (target.type === 'step') {
      this.state.stepDraft.subject = value;
    } else {
      this.state.broadcastDraft.subject = value;
      this.queueDraftSave();
    }
    const headline = document.getElementById('email-preview-headline');
    if (headline) headline.textContent = value;
  }

  async duplicateCampaign() {
    const c = this.state.campaignDetail;
    const res = await this.api('/api/admin/campaigns', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: `${c.name} (copy)` }),
    });
    const draft = await res.json();
    await this.api(`/api/admin/campaigns/${draft.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject: c.subject, bodyHtml: c.bodyHtml, ctaUrl: c.ctaUrl, audienceActivity: c.audienceActivity }),
    });
    await this.openCompose(draft.id);
  }

  async addStep() {
    const subject = window.prompt('Subject for the new step:');
    if (!subject) return;
    const waitDays = Number(window.prompt('Days after signup to send (0 = instant):', '7')) || 0;
    await this.api('/api/admin/automations/welcome-series/steps', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ subject, waitDays }),
    });
    await this.openSeries();
  }

  showToast(text, color, iconName) {
    this.state.toast = { text, color, icon: iconName };
    this.render();
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => { this.state.toast = null; this.render(); }, 2800);
  }

  // ---------- photo actions ----------
  async approvePhoto(id) {
    await this.api(`/api/admin/photos/${id}/approve`, { method: 'POST' });
    await this.loadPhotos();
    if (this.state.photoModalId === id) this.state.photoModalId = null;
    if (this.state.overview) this.state.overview.pendingPhotos = this.state.photoCounts.pending;
    this.showToast('Photo approved & published', '#34E0A0', 'check');
    this.render();
  }

  openReject(id) { this.setState({ rejectForId: id, rejectReason: '' }); }
  closeReject() { this.setState({ rejectForId: null, rejectReason: '' }); }

  async confirmReject() {
    const id = this.state.rejectForId;
    if (!this.state.rejectReason.trim()) return;
    await this.api(`/api/admin/photos/${id}/reject`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason: this.state.rejectReason.trim() }),
    });
    await this.loadPhotos();
    if (this.state.photoModalId === id) this.state.photoModalId = null;
    if (this.state.overview) this.state.overview.pendingPhotos = this.state.photoCounts.pending;
    this.setState({ rejectForId: null, rejectReason: '' });
    this.showToast('Photo rejected', '#FF6B7D', 'x');
  }

  openPhotoModal(id) { this.setState({ photoModalId: id }); }
  closePhotoModal() { this.setState({ photoModalId: null }); }

  // ---------- users / rinks search ----------
  onUserSearch(v) {
    this.state.userSearch = v; this.state.usersPage = 1;
    clearTimeout(this._userSearchTimer);
    this._userSearchTimer = setTimeout(async () => {
      await this.loadUsers(); this.render(); this.refocusSearch('user-search-input');
    }, 300);
  }
  onRinkSearch(v) {
    this.state.rinkSearch = v; this.state.rinksPage = 1;
    clearTimeout(this._rinkSearchTimer);
    this._rinkSearchTimer = setTimeout(async () => {
      await this.loadRinks(); this.render(); this.refocusSearch('rink-search-input');
    }, 300);
  }
  refocusSearch(id) {
    const input = document.getElementById(id);
    if (input) { input.focus(); const n = input.value.length; input.setSelectionRange(n, n); }
  }
  async goUsersPage(delta) {
    this.state.usersPage += delta;
    await this.loadUsers();
    this.render();
  }
  async goRinksPage(delta) {
    this.state.rinksPage += delta;
    await this.loadRinks();
    this.render();
  }

  // ---------- rink editor ----------
  async openEditor(rinkId) {
    const res = await this.api(`/api/admin/rinks/${rinkId}`);
    const rink = await res.json();
    this.setState({ editRinkId: rinkId, rinkDraft: JSON.parse(JSON.stringify(rink)), rinkAdmins: [], rinkAdminEmailInput: '', rinkAdminError: '' });
    await this.loadRinkAdmins();
  }
  closeEditor() { this.setState({ editRinkId: null, rinkDraft: null, rinkAdmins: [], rinkAdminEmailInput: '', rinkAdminError: '' }); }

  async loadRinkAdmins() {
    const res = await this.api(`/api/admin/rinks/${this.state.editRinkId}/admins`);
    const admins = await res.json();
    this.setState({ rinkAdmins: admins });
  }

  async addRinkAdmin() {
    const email = this.state.rinkAdminEmailInput.trim();
    if (!email) return;
    const res = await fetch(`/api/admin/rinks/${this.state.editRinkId}/admins`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      this.setState({ rinkAdminError: err.detail || 'Could not add that admin' });
      return;
    }
    this.setState({ rinkAdminEmailInput: '', rinkAdminError: '' });
    await this.loadRinkAdmins();
    this.showToast('Rink admin added', '#14CFCF', 'check');
  }

  async removeRinkAdmin(adminId) {
    await this.api(`/api/admin/rinks/${this.state.editRinkId}/admins/${adminId}`, { method: 'DELETE' });
    await this.loadRinkAdmins();
    this.showToast('Rink admin removed', '#FF6B7D', 'x');
  }

  updateDraft(field, value) { this.state.rinkDraft[field] = value; this.render(); }
  updateDraftHour(day, value) { this.state.rinkDraft.hours[day] = value; this.render(); }
  updateDraftAmenities(value) { this.state.rinkDraft.amenities = value.split(',').map(s => s.trim()).filter(Boolean); }

  async saveRink() {
    const draft = this.state.rinkDraft;
    const res = await this.api(`/api/admin/rinks/${this.state.editRinkId}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: draft.type, phone: draft.phone, address: draft.address, hours: draft.hours, amenities: draft.amenities }),
    });
    await res.json();
    this.closeEditor();
    await this.loadRinks();
    if (this.state.overview) await this.loadOverview();
    this.showToast('Rink saved', '#14CFCF', 'check');
  }

  async logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    location.href = '/';
  }

  // ================= RENDER =================
  render() {
    if (!this.state.ready) {
      if (this.state.denied) this.renderDenied();
      return;
    }
    if (this.state.denied) { this.renderDenied(); return; }

    this.renderSidebar();
    this.renderTopbar();
    this.renderContent();
    this.renderEditor();
    this.renderModals();
    this.renderToast();

    document.getElementById('sidebar').classList.toggle('open', this.state.isNarrow && this.state.drawerOpen);
    document.getElementById('sidebar-scrim').classList.toggle('open', this.state.isNarrow && this.state.drawerOpen);
    document.getElementById('hamburger-icon').innerHTML = icon('menu');
  }

  renderDenied() {
    document.getElementById('app').innerHTML = `
      <div class="denied-wrap">
        <h1>${this.state.denied === 403 ? 'Admin access required' : 'Sign in required'}</h1>
        <p>${this.state.denied === 403
          ? "You're signed in, but this account doesn't have admin access."
          : 'You need to be signed in as an admin to view this page.'}
        </p>
        <p style="margin-top:14px;"><a href="/">Go to RinkCollective →</a></p>
      </div>`;
  }

  renderSidebar() {
    const s = this.state;
    const renderItem = (item) => {
      const active = s.view === item.id;
      const badge = item.id === 'photos' && s.photoCounts.pending > 0
        ? `<span class="nav-badge">${s.photoCounts.pending}</span>` : '';
      return `<button class="nav-item ${active ? 'active' : ''}" data-nav="${item.id}"><span class="ic">${icon(item.icon)}</span><span style="flex:1;text-align:left;">${item.label}</span>${badge}</button>`;
    };
    const groups = [];
    NAV_ITEMS.forEach(item => {
      let group = groups.find(g => g.name === item.group);
      if (!group) { group = { name: item.group, items: [] }; groups.push(group); }
      group.items.push(item);
    });
    document.getElementById('sb-nav-items').innerHTML = groups.map(g => `
      <div class="sb-label">${g.name}</div>
      ${g.items.map(renderItem).join('')}`).join('');
    document.querySelectorAll('[data-nav]').forEach(btn => {
      btn.addEventListener('click', () => this.setView(btn.dataset.nav));
    });

    const user = s.currentUser || {};
    document.getElementById('sb-footer').innerHTML = `
      <div class="sb-avatar">${initials(user.displayName)}</div>
      <div style="flex:1;min-width:0;line-height:1.2;">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(user.displayName || '')}</div>
        <div style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.06em;text-transform:uppercase;color:#FFD24D;">Superadmin</div>
      </div>
      <button class="sb-logout" id="logout-btn" aria-label="Log out" title="Log out">${icon('logout')}</button>`;
    document.getElementById('logout-btn').addEventListener('click', () => this.logout());
  }

  renderTopbar() {
    const [title, subtitle] = PAGE_META[this.state.view];
    document.getElementById('page-title').textContent = title;
    document.getElementById('page-subtitle').textContent = subtitle;
  }

  renderContent() {
    const el = document.getElementById('content-inner');
    const v = this.state.view;
    if (v === 'overview') el.innerHTML = this.viewOverview();
    else if (v === 'photos') el.innerHTML = this.viewPhotos();
    else if (v === 'users') el.innerHTML = this.viewUsers();
    else if (v === 'rinks') el.innerHTML = this.viewRinks();
    else if (v === 'activity') el.innerHTML = this.viewActivity();
    else if (v === 'campaigns') el.innerHTML = this.viewCampaigns();
    this.bindContentEvents();
  }

  bindContentEvents() {
    const v = this.state.view;
    document.querySelectorAll('[data-approve]').forEach(b => b.addEventListener('click', () => this.approvePhoto(Number(b.dataset.approve))));
    document.querySelectorAll('[data-reject]').forEach(b => b.addEventListener('click', () => this.openReject(Number(b.dataset.reject))));
    document.querySelectorAll('[data-view-photo]').forEach(b => b.addEventListener('click', () => this.openPhotoModal(Number(b.dataset.viewPhoto))));
    document.querySelectorAll('[data-photo-tab]').forEach(b => b.addEventListener('click', async () => {
      this.state.photoFilter = b.dataset.photoTab; await this.loadPhotos(); this.render();
    }));
    document.querySelectorAll('[data-edit-rink]').forEach(b => b.addEventListener('click', () => this.openEditor(Number(b.dataset.editRink))));
    document.querySelectorAll('[data-go-photos]').forEach(b => b.addEventListener('click', () => this.setView('photos')));

    if (v === 'users') {
      const input = document.getElementById('user-search-input');
      if (input) input.addEventListener('input', (e) => this.onUserSearch(e.target.value));
      const prev = document.getElementById('users-prev'), next = document.getElementById('users-next');
      if (prev) prev.addEventListener('click', () => this.goUsersPage(-1));
      if (next) next.addEventListener('click', () => this.goUsersPage(1));
    }
    if (v === 'rinks') {
      const input = document.getElementById('rink-search-input');
      if (input) input.addEventListener('input', (e) => this.onRinkSearch(e.target.value));
      const prev = document.getElementById('rinks-prev'), next = document.getElementById('rinks-next');
      if (prev) prev.addEventListener('click', () => this.goRinksPage(-1));
      if (next) next.addEventListener('click', () => this.goRinksPage(1));
    }
    if (v === 'campaigns') this.bindCampaignEvents();
  }

  bindCampaignEvents() {
    const cv = this.state.campaignsView;
    const newBtn = document.getElementById('new-campaign-btn');
    if (newBtn) newBtn.addEventListener('click', () => this.openNewCampaignModal());

    if (cv === 'list') {
      document.querySelectorAll('[data-camp-filter]').forEach(b => b.addEventListener('click', () => {
        this.setState({ campaignsFilter: b.dataset.campFilter });
      }));
      document.querySelectorAll('[data-camp-row]').forEach(row => row.addEventListener('click', () => {
        const c = this.state.campaignsList.find(x => x.id === Number(row.dataset.campRow));
        if (c) this.openCampaignRow(c);
      }));
    }

    if (cv === 'series') {
      document.getElementById('camp-back-btn').addEventListener('click', () => this.backToList());
      document.getElementById('automation-toggle').addEventListener('click', () => this.toggleAutomation());
      document.getElementById('add-step-btn').addEventListener('click', () => this.addStep());
      document.getElementById('send-test-series-btn').addEventListener('click', () => this.sendSeriesTest());
      document.querySelectorAll('[data-step-id]').forEach(card => card.addEventListener('click', () => {
        const step = this.state.campaignDetail.steps.find(s => s.id === Number(card.dataset.stepId));
        if (step) this.openStepEditor(step);
      }));
    }

    if (cv === 'report') {
      document.getElementById('camp-back-btn').addEventListener('click', () => this.backToList());
      document.getElementById('duplicate-btn').addEventListener('click', () => this.duplicateCampaign());
    }

    if (cv === 'compose') {
      const target = this.state.composeTarget;
      document.getElementById('camp-back-btn').addEventListener('click', () => {
        if (target.type === 'step') this.backToSeries(); else this.backToList();
      });
      const subjectInput = document.getElementById('subject-input');
      if (subjectInput) subjectInput.addEventListener('input', (e) => this.onSubjectInput(e.target.value));
      const bodyEl = document.getElementById('body-editable');
      if (bodyEl) bodyEl.addEventListener('input', () => this.onBodyInput(bodyEl));
      document.querySelectorAll('[data-tb]').forEach(b => b.addEventListener('click', () => this.execToolbar(b.dataset.tb)));
      document.querySelectorAll('[data-device]').forEach(b => b.addEventListener('click', () => this.setDevice(b.dataset.device)));
      const tagBtn = document.getElementById('insert-tag-btn');
      if (tagBtn) tagBtn.addEventListener('click', () => this.insertMergeTag());

      if (target.type === 'step') {
        document.getElementById('step-save-btn').addEventListener('click', () => this.saveStep());
        document.getElementById('step-send-test-btn').addEventListener('click', () => this.sendStepTest(target.id));
      } else {
        document.querySelectorAll('[data-activity-seg]').forEach(b => b.addEventListener('click', () => this.setActivitySegment(b.dataset.activitySeg)));
        const ctaBtn = document.getElementById('insert-cta-btn');
        if (ctaBtn) ctaBtn.addEventListener('click', () => this.insertCtaButton());
        document.getElementById('send-test-btn').addEventListener('click', () => this.sendTestEmail());
        document.getElementById('schedule-btn').addEventListener('click', () => this.openScheduleModal());
        document.getElementById('send-now-btn').addEventListener('click', () => this.openSendConfirm());
      }
    }
  }

  viewOverview() {
    const ov = this.state.overview;
    if (!ov) return '';
    const stats = [
      { icon: 'image', color: '#FFC83D', bg: 'rgba(255,210,77,0.12)', value: ov.pendingPhotos, label: 'Photos pending review', delta: ov.pendingPhotos > 0 ? 'Needs review' : 'All clear', deltaColor: ov.pendingPhotos > 0 ? '#FFD24D' : '#34E0A0' },
      { icon: 'users', color: '#14CFCF', bg: 'rgba(20,207,207,0.12)', value: ov.totalMembers.toLocaleString(), label: 'Total members', delta: `+${ov.membersDelta30d} / 30d`, deltaColor: '#14CFCF' },
      { icon: 'rink', color: '#CB78FF', bg: 'rgba(203,120,255,0.12)', value: ov.totalRinks.toLocaleString(), label: 'Rinks in directory', delta: 'Directory total', deltaColor: '#CB78FF' },
      { icon: 'activity', color: '#34E0A0', bg: 'rgba(52,224,160,0.12)', value: ov.actionsToday, label: 'Your actions today', delta: 'Today', deltaColor: '#34E0A0' },
    ];
    const statCards = stats.map(s => `
      <div class="stat-card">
        <div class="stat-top">
          <div class="stat-icon-wrap" style="background:${s.bg};color:${s.color};">${icon(s.icon)}</div>
          <span class="stat-delta" style="color:${s.deltaColor};">${s.delta}</span>
        </div>
        <div class="stat-value">${s.value}</div>
        <div class="stat-label">${s.label}</div>
      </div>`).join('');

    const pending = ov.pendingPreview.slice(0, 4);
    const pendingHtml = pending.length ? pending.map(p => `
      <div class="pending-row">
        <button class="pending-thumb" data-view-photo="${p.id}" style="background-image:url('/api/admin/photos/${p.id}/image');"></button>
        <div style="flex:1;min-width:0;">
          <div class="pending-name">${esc(p.rinkName)}</div>
          <div class="pending-meta">by ${esc(p.submitterName)} · <span style="font-family:var(--font-mono);font-size:11px;">${relTime(p.submittedAt)}</span></div>
        </div>
        <div style="display:flex;gap:7px;flex-shrink:0;">
          <button class="icon-btn approve" data-approve="${p.id}" title="Approve">${icon('check', 2.5)}</button>
          <button class="icon-btn reject" data-reject="${p.id}" title="Reject">${icon('x', 2.2)}</button>
        </div>
      </div>`).join('') : `<div class="empty-note">🎉 Queue is clear — no photos waiting.</div>`;

    const activityHtml = ov.recentActivity.length ? ov.recentActivity.map(a => {
      const st = ACTIVITY_STYLE[a.kind] || ACTIVITY_STYLE.rink;
      return `<div class="activity-row"><span class="activity-dot" style="background:${st.color};"></span><div style="flex:1;min-width:0;"><div class="activity-text">${esc(a.text)}</div><div class="activity-time">${relTime(a.createdAt)}</div></div></div>`;
    }).join('') : `<div class="empty-note">No activity yet.</div>`;

    return `
      <div class="stat-grid">${statCards}</div>
      <div class="split">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Pending photo submissions</span><button class="panel-link" data-go-photos>Review all →</button></div>
          ${pendingHtml}
        </div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Recent activity</span></div>
          ${activityHtml}
        </div>
      </div>`;
  }

  viewPhotos() {
    const s = this.state;
    const tabs = [['pending', `Pending (${s.photoCounts.pending})`], ['approved', `Approved (${s.photoCounts.approved})`]];
    const tabsHtml = tabs.map(([id, label]) => `<button class="tab-btn ${s.photoFilter === id ? 'active' : ''}" data-photo-tab="${id}">${label}</button>`).join('');

    if (!s.photos.length) {
      const msg = s.photoFilter === 'pending' ? 'No photos waiting for review.' : 'No approved photos yet.';
      return `<div class="tabs">${tabsHtml}</div><div class="dashed-empty"><div style="font-size:15px;font-weight:600;color:var(--text-muted);">Nothing here</div><div style="font-size:13px;color:#656C84;margin-top:5px;">${msg}</div></div>`;
    }

    const cards = s.photos.map(p => {
      const info = TYPE_INFO[p.rinkType] || TYPE_INFO.STANDARD;
      const footer = s.photoFilter === 'pending'
        ? `<div class="photo-footer"><button class="btn-approve" data-approve="${p.id}">${icon('check')}Approve</button><button class="btn-reject" data-reject="${p.id}">${icon('x')}Reject</button></div>`
        : `<div class="photo-footer"><div class="status-pill">${icon('check')}Published</div></div>`;
      return `
        <div class="photo-card">
          <button class="photo-thumb-btn" data-view-photo="${p.id}" style="background-image:url('/api/admin/photos/${p.id}/image');">
            <span class="type-badge thumb-badge" style="background:${info.bg};border:1px solid ${info.color}40;color:${info.color};">${info.label}</span>
            <span class="thumb-eye">${icon('eye')}</span>
          </button>
          <div class="photo-body">
            <div class="photo-rink">${esc(p.rinkName)}</div>
            <div class="photo-city">${esc(p.rinkCity)}, ${esc(p.rinkState)}</div>
            <div class="submitter-row">
              <div class="av-chip" style="background:${avColor(p.submitterName)};">${initials(p.submitterName)}</div>
              <span class="submitter-name">${esc(p.submitterName)}</span>
              <span style="font-family:var(--font-mono);font-size:10.5px;color:#4B5168;flex-shrink:0;">${relTime(p.submittedAt)}</span>
            </div>
            ${footer}
          </div>
        </div>`;
    }).join('');

    return `<div class="tabs">${tabsHtml}</div><div class="photo-grid">${cards}</div>`;
  }

  viewUsers() {
    const s = this.state;
    const rows = s.users.map(u => `
      <div class="table-row">
        <div class="cell-member"><div class="cell-avatar" style="background:${avColor(u.name)};">${initials(u.name)}</div><span class="cell-name">${esc(u.name)}</span></div>
        <div class="cell-muted">${esc(u.email)}</div>
        <div class="cell-mono col-joined">${new Date(u.joined).toLocaleDateString()}</div>
        <div class="cell-mono col-logins" style="text-align:right;">${u.logins}</div>
        <div style="display:flex;justify-content:flex-end;">${this.roleBadge(u.role)}</div>
      </div>`).join('');

    const totalPages = Math.max(1, Math.ceil(s.usersTotal / 50));
    return `
      <div class="toolbar">
        <div class="search-wrap"><span class="ic">${icon('search')}</span><input id="user-search-input" type="text" placeholder="Search by name or email…" value="${esc(s.userSearch)}"></div>
        <div class="count-label">${s.users.length} of ${s.usersTotal} members shown</div>
      </div>
      <div class="data-table" id="users-table">
        <div class="table-head"><div>Member</div><div>Email</div><div class="col-joined">Joined</div><div class="col-logins" style="text-align:right;">Logins</div><div style="text-align:right;">Role</div></div>
        ${rows || `<div class="empty-note">No members match "${esc(s.userSearch)}".</div>`}
      </div>
      ${totalPages > 1 ? `<div class="pager"><button id="users-prev" ${s.usersPage <= 1 ? 'disabled' : ''}>← Prev</button><span>Page ${s.usersPage} of ${totalPages}</span><button id="users-next" ${s.usersPage >= totalPages ? 'disabled' : ''}>Next →</button></div>` : ''}`;
  }

  roleBadge(role) {
    const styles = {
      superadmin: 'background:rgba(255,210,77,0.12);color:#FFD24D;',
      contributor: 'background:rgba(203,120,255,0.12);color:#CB78FF;',
      member: 'background:rgba(136,143,168,0.12);color:#888FA8;',
    };
    const labels = { superadmin: 'Superadmin', contributor: 'Contributor', member: 'Member' };
    return `<span class="role-pill" style="${styles[role] || styles.member}">${labels[role] || 'Member'}</span>`;
  }

  viewRinks() {
    const s = this.state;
    const rows = s.rinks.map(r => `
      <div class="table-row">
        <div style="min-width:0;"><div class="cell-name">${esc(r.name)}</div><div style="font-size:12px;color:#656C84;margin-top:2px;">${esc(r.city)}</div></div>
        <div>${typeBadge(r.type)}</div>
        <div class="cell-mono col-phone">${esc(r.phone)}</div>
        <div class="col-hours" style="font-size:12px;color:#888FA8;line-height:1.4;">${esc(r.hoursSummary)}</div>
        <div style="display:flex;justify-content:flex-end;"><button class="edit-btn" data-edit-rink="${r.id}">${icon('edit')}Edit</button></div>
      </div>`).join('');

    const totalPages = Math.max(1, Math.ceil(s.rinksTotal / 50));
    return `
      <div class="toolbar">
        <div class="search-wrap"><span class="ic">${icon('search')}</span><input id="rink-search-input" type="text" placeholder="Search rinks by name or city…" value="${esc(s.rinkSearch)}"></div>
        <div class="count-label">${s.rinks.length} of ${s.rinksTotal} rinks</div>
      </div>
      <div class="data-table" id="rinks-table">
        <div class="table-head"><div>Rink</div><div>Type</div><div class="col-phone">Phone</div><div class="col-hours">Hours</div><div></div></div>
        ${rows}
      </div>
      ${totalPages > 1 ? `<div class="pager"><button id="rinks-prev" ${s.rinksPage <= 1 ? 'disabled' : ''}>← Prev</button><span>Page ${s.rinksPage} of ${totalPages}</span><button id="rinks-next" ${s.rinksPage >= totalPages ? 'disabled' : ''}>Next →</button></div>` : ''}`;
  }

  viewActivity() {
    const rows = this.state.activity.map(a => {
      const st = ACTIVITY_STYLE[a.kind] || ACTIVITY_STYLE.rink;
      return `<div class="activity-log-row"><div class="activity-icon" style="background:${st.bg};border-color:${st.border};color:${st.color};">${icon(st.icon)}</div><div style="flex:1;min-width:0;"><div class="activity-text">${esc(a.text)}</div></div><div class="cell-mono" style="flex-shrink:0;">${relTime(a.createdAt)}</div></div>`;
    }).join('');
    return `<div class="data-table">${rows || `<div class="empty-note">No activity yet.</div>`}</div>`;

  // ---------- campaigns ----------
  viewCampaigns() {
    const v = this.state.campaignsView;
    if (v === 'series') return this.viewCampaignSeries();
    if (v === 'report') return this.viewCampaignReport();
    if (v === 'compose') return this.viewCampaignCompose();
    return this.viewCampaignsList();
  }

  viewCampaignsList() {
    const s = this.state;
    const filters = [['all', 'All'], ['automations', 'Automations'], ['broadcasts', 'Broadcasts']];
    const tabsHtml = filters.map(([id, label]) => `<button class="tab-btn ${s.campaignsFilter === id ? 'active' : ''}" data-camp-filter="${id}">${label}</button>`).join('');
    const rows = s.campaignsList.filter(c => {
      if (s.campaignsFilter === 'automations') return c.kind === 'automation';
      if (s.campaignsFilter === 'broadcasts') return c.kind === 'broadcast';
      return true;
    });
    const rowsHtml = rows.map(c => this.campaignRowHtml(c)).join('');
    return `
      <div style="display:flex;align-items:center;margin-bottom:18px;gap:12px;flex-wrap:wrap;">
        <div class="tabs" style="margin-bottom:0;">${tabsHtml}</div>
        <button class="btn-primary" style="margin-left:auto;" id="new-campaign-btn">${icon('plus')}New campaign</button>
      </div>
      <div class="data-table" id="campaigns-table">
        <div class="table-head"><div>Campaign</div><div class="col-audience">Audience</div><div>Status</div><div class="col-opens" style="text-align:right;">Opens</div><div class="col-clicks" style="text-align:right;">Clicks</div></div>
        ${rowsHtml || `<div class="empty-note">No campaigns yet.</div>`}
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:#656C84;">
        <span style="color:#34E0A0;display:flex;">${icon('zap')}</span>
        Click any row to open it — Auto rows open the sequence, sent broadcasts open the report.
      </div>`;
  }

  campaignRowHtml(c) {
    const isAuto = c.kind === 'automation';
    const typeStyle = isAuto
      ? { bg: 'rgba(52,224,160,0.12)', color: '#34E0A0', ic: 'zap' }
      : c.status === 'sent' ? { bg: 'rgba(20,207,207,0.12)', color: '#14CFCF', ic: 'send' }
      : c.status === 'scheduled' ? { bg: 'rgba(79,184,255,0.12)', color: '#4FB8FF', ic: 'clock' }
      : { bg: 'rgba(136,143,168,0.12)', color: '#888FA8', ic: 'send' };
    const statusStyle = CAMPAIGN_STATUS_STYLE[c.status] || CAMPAIGN_STATUS_STYLE.draft;
    const audienceLabel = isAuto ? 'On signup' : `${ACTIVITY_LABELS[c.audienceActivity] || 'All members'} · ${c.reach.toLocaleString()}`;
    const subLabel = isAuto
      ? `Automated · ${c.steps.length} emails`
      : c.status === 'sent' ? `Sent ${shortDate(c.sentAt)}`
      : c.status === 'scheduled' ? `Sends ${shortDate(c.scheduledAt)}`
      : `Draft · edited ${relTime(c.updatedAt)}`;
    return `
      <div class="table-row" data-camp-row="${c.id}" style="cursor:pointer;">
        <div class="camp-name-cell">
          <div class="camp-type-well" style="background:${typeStyle.bg};color:${typeStyle.color};">${icon(typeStyle.ic)}</div>
          <div style="min-width:0;">
            <div class="cell-name">${esc(c.name)}${isAuto ? '<span class="badge-auto">Auto</span>' : ''}</div>
            <div class="camp-sub">${subLabel}</div>
          </div>
        </div>
        <div class="cell-muted col-audience">${audienceLabel}</div>
        <div><span class="camp-status-pill" style="background:${statusStyle.bg};color:${statusStyle.color};">${statusStyle.label}</span></div>
        <div class="camp-mono-right col-opens" style="color:${c.openRate != null ? '#34E0A0' : '#4B5168'};">${pct(c.openRate)}</div>
        <div class="camp-mono-right col-clicks" style="color:${c.clickRate != null ? '#34E0A0' : '#4B5168'};">${pct(c.clickRate)}</div>
      </div>`;
  }

  viewCampaignSeries() {
    const c = this.state.campaignDetail;
    if (!c) return '';
    const stepColors = ['#34E0A0', '#14CFCF', '#CB78FF'];
    const stats = [
      { value: c.entered30d, label: 'Entered / 30d', color: '#34E0A0' },
      { value: pct(c.openRate), label: 'Avg open rate', color: '#14CFCF' },
      { value: pct(c.clickRate), label: 'Avg click rate', color: '#CB78FF' },
    ];
    const statCards = stats.map(st => `
      <div class="stat-card" style="flex:1;">
        <div class="stat-value" style="color:${st.color};">${st.value}</div>
        <div class="stat-label">${st.label}</div>
      </div>`).join('');

    const stepsHtml = c.steps.map((step, i) => {
      const color = stepColors[i % stepColors.length];
      const waitLabel = step.waitDays === 0 ? 'Instant' : `+${step.waitDays} day${step.waitDays === 1 ? '' : 's'}`;
      return `
        <div class="step-connector">
          <span style="color:#656C84;display:flex;">${icon('clock')}</span>
          <span class="camp-sub" style="margin:0;">${waitLabel}</span>
          <div class="step-connector-track"></div>
        </div>
        <button class="step-card" data-step-id="${step.id}" style="border-top-color:${color};">
          <div class="camp-sub" style="margin:0 0 6px;">Email ${i + 1}</div>
          <div style="font-size:13.5px;font-weight:600;color:var(--text);line-height:1.35;">${esc(step.subject)}</div>
          <div class="step-card-stats">
            <div><div class="camp-sub" style="margin:0;">Open</div><div style="font-size:13px;font-weight:700;color:${color};">${pct(step.openRate)}</div></div>
            <div><div class="camp-sub" style="margin:0;">Click</div><div style="font-size:13px;font-weight:700;color:${color};">${pct(step.clickRate)}</div></div>
          </div>
        </button>`;
    }).join('');

    return `
      <div class="camp-header-row">
        <button class="camp-back-btn" id="camp-back-btn">${icon('arrowLeft')}</button>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);">${esc(c.name)}</div>
          <div class="camp-sub" style="margin-top:2px;">Automated · triggered on account creation</div>
        </div>
        <div class="camp-toggle-wrap">
          <button class="camp-toggle ${c.active ? 'on' : ''}" id="automation-toggle"><span class="knob"></span></button>
          <span class="camp-toggle-label">${c.active ? 'ON' : 'OFF'}</span>
        </div>
      </div>
      <div style="display:flex;gap:14px;">${statCards}</div>
      <div class="panel" style="margin-top:18px;padding:18px;">
        <div class="panel-title" style="margin-bottom:4px;">Sequence</div>
        <div class="flow-wrap" style="opacity:${c.active ? '1' : '0.4'};">
          <div class="trigger-node">
            <div style="color:#34E0A0;margin-bottom:6px;display:flex;justify-content:center;">${icon('userPlus')}</div>
            <div style="font-size:13px;font-weight:600;color:var(--text);">Signs up</div>
            <div class="camp-sub" style="margin:2px 0 0;">Trigger</div>
          </div>
          ${stepsHtml}
          <button class="add-step-btn" id="add-step-btn">${icon('plus')} Add step</button>
        </div>
        <div style="display:flex;justify-content:flex-end;padding:0 4px;">
          <button class="panel-link" id="send-test-series-btn">Send myself a test →</button>
        </div>
      </div>`;
  }

  viewCampaignReport() {
    const c = this.state.campaignDetail;
    const r = this.state.campaignReport;
    if (!c || !r) return '';
    const stats = [
      { ic: 'check', color: '#34E0A0', bg: 'rgba(52,224,160,0.12)', label: 'Delivered', value: r.delivered.toLocaleString(), sub: `${(100 - r.unsubscribeRate).toFixed(1)}% inbox rate` },
      { ic: 'eye', color: '#14CFCF', bg: 'rgba(20,207,207,0.12)', label: 'Opens', value: pct(r.openRate), sub: `${r.opened.toLocaleString()} unique` },
      { ic: 'link', color: '#CB78FF', bg: 'rgba(203,120,255,0.12)', label: 'Clicks', value: pct(r.clickRate), sub: `${r.clicked.toLocaleString()} unique` },
      { ic: 'x', color: '#FF7A7A', bg: 'rgba(255,122,122,0.12)', label: 'Unsubscribed', value: `${r.unsubscribeRate}%`, sub: `${r.unsubscribed.toLocaleString()} members` },
    ];
    const statCards = stats.map(s => `
      <div class="stat-card">
        <div class="stat-top"><div class="stat-icon-wrap" style="background:${s.bg};color:${s.color};">${icon(s.ic)}</div></div>
        <div class="stat-value" style="font-size:22px;color:${s.color};">${s.value}</div>
        <div class="stat-label">${s.label}</div>
        <div class="camp-sub" style="margin-top:4px;">${s.sub}</div>
      </div>`).join('');

    const funnelRows = [
      { label: 'Delivered', count: r.delivered, pctVal: 100, color: '#888FA8' },
      { label: 'Opened', count: r.opened, pctVal: r.openRate, color: '#14CFCF' },
      { label: 'Clicked', count: r.clicked, pctVal: r.clickRate, color: '#34E0A0' },
      { label: 'Converted', count: r.converted, pctVal: r.convertedRate, color: '#CB78FF' },
    ].map(row => `
      <div class="funnel-row">
        <div class="funnel-top"><span style="color:var(--text);font-weight:600;">${row.label}</span><span class="cell-mono">${row.count.toLocaleString()} · ${row.pctVal}%</span></div>
        <div class="funnel-track"><div class="funnel-fill" style="width:${row.pctVal}%;background:${row.color};"></div></div>
      </div>`).join('');

    const topLinksHtml = r.topLinks.length ? r.topLinks.map(l => `
      <div class="toplink-row">
        <span style="color:#656C84;display:flex;">${icon('link')}</span>
        <span class="toplink-url">${esc(l.url)}</span>
        <span class="cell-mono" style="color:#14CFCF;">${l.clicks.toLocaleString()}</span>
      </div>`).join('') : `<div class="empty-note">No clicks yet.</div>`;

    return `
      <div class="camp-header-row">
        <button class="camp-back-btn" id="camp-back-btn">${icon('arrowLeft')}</button>
        <div style="min-width:0;">
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.name)}</div>
          <div class="camp-sub" style="margin-top:2px;">${shortDate(c.sentAt)} · ${ACTIVITY_LABELS[c.audienceActivity] || 'All members'}</div>
        </div>
        <button class="edit-btn" style="margin-left:auto;" id="duplicate-btn">${icon('copy')}Duplicate</button>
      </div>
      <div class="stat-grid">${statCards}</div>
      <div class="split">
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Engagement funnel</span></div>
          ${funnelRows}
        </div>
        <div class="panel">
          <div class="panel-head"><span class="panel-title">Top links clicked</span></div>
          ${topLinksHtml}
        </div>
      </div>`;
  }

            <h1 id="email-preview-headline">${esc(subject || 'Your subject line')}</h1>
