            <a href="#" style="color:#656C84;text-decoration:underline;">Manage preferences</a>
          </div>
        </div>
      </div>`;
  }

  viewCampaignCompose() {
    const target = this.state.composeTarget;
    if (target && target.type === 'step') return this.viewStepCompose();
    return this.viewBroadcastCompose();
  }

  viewStepCompose() {
    const d = this.state.stepDraft;
    if (!d) return '';
    return `
      <div class="camp-header-row">
        <button class="camp-back-btn" id="camp-back-btn">${icon('arrowLeft')}</button>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);">Email ${d.order}</div>
          <div class="camp-sub" style="margin-top:2px;">${d.waitDays === 0 ? 'Sends instantly on signup' : `Sends ${d.waitDays} day${d.waitDays === 1 ? '' : 's'} after signup`}</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:10px;">
          <button class="edit-btn" id="step-send-test-btn">${icon('beaker')}Send test</button>
          <button class="btn-primary" id="step-save-btn">${icon('check')}Save</button>
        </div>
      </div>
      <div class="compose-grid">
        <div class="compose-col-left">
          <div class="compose-eyebrow first">Subject</div>
          <input class="field-input" id="subject-input" value="${esc(d.subject)}">
          <div class="compose-eyebrow">Body</div>
          <div class="editor-toolbar">
            <button class="toolbar-btn" data-tb="bold">B</button>
            <button class="toolbar-btn" data-tb="italic" style="font-style:italic;">i</button>
            <button class="toolbar-btn" data-tb="quote">"</button>
            <button class="toolbar-btn" data-tb="list">≡</button>
            <button class="toolbar-btn" data-tb="link">${icon('link')}</button>
            <button class="toolbar-btn" id="insert-tag-btn">{name}</button>
            <span class="toolbar-note">Brand header + footer auto-applied</span>
          </div>
          <div class="body-editable" id="body-editable" contenteditable="true">${d.bodyHtml}</div>
        </div>
        <div class="compose-col-right">
          ${this.emailPreviewHtml(d.subject, d.bodyHtml)}
        </div>
      </div>`;
  }

  viewBroadcastCompose() {
    const d = this.state.broadcastDraft;
    if (!d) return '';
    const activityOpts = ['active', 'inactive', 'all'];
    const segHtml = activityOpts.map(a => `<button class="activity-seg-opt ${d.audienceActivity === a ? 'active' : ''}" data-activity-seg="${a}">${ACTIVITY_LABELS[a]}</button>`).join('');
    const reach = this.state.campaignReach != null ? this.state.campaignReach : d.reach;
    return `
      <div class="camp-header-row">
        <button class="camp-back-btn" id="camp-back-btn">${icon('arrowLeft')}</button>
        <div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);">${esc(d.name)}</div>
          <div class="camp-sub" id="compose-saved-label" style="margin-top:2px;">Draft · saved just now</div>
        </div>
        <div style="margin-left:auto;display:flex;gap:10px;">
          <button class="edit-btn" id="send-test-btn">${icon('beaker')}Send test</button>
          <button class="edit-btn" id="schedule-btn">${icon('clock')}Schedule</button>
          <button class="btn-primary" id="send-now-btn">${icon('send')}Send to ${reach.toLocaleString()}</button>
        </div>
      </div>
      <div class="compose-grid">
        <div class="compose-col-left">
          <div class="compose-eyebrow first">Audience</div>
          <div class="audience-card">
            <div class="audience-section">
              <div class="audience-section-head">
                <span style="color:#656C84;display:flex;">${icon('activity')}</span> Activity
                <div class="activity-seg">${segHtml}</div>
              </div>
            </div>
          </div>
          <div class="reach-banner">
            ${icon('users')} Reaches <strong id="reach-count" style="margin:0 4px;">${reach.toLocaleString()}</strong> members
            <span id="reach-warn" style="color:#FFC83D;display:${reach === 0 ? 'inline' : 'none'};margin-left:4px;">· pick a broader segment</span>
          </div>
          <div class="compose-eyebrow">Subject</div>
          <input class="field-input" id="subject-input" value="${esc(d.subject || '')}" placeholder="Your subject line">
          <div class="compose-eyebrow">Body</div>
          <div class="editor-toolbar">
            <button class="toolbar-btn" data-tb="bold">B</button>
            <button class="toolbar-btn" data-tb="italic" style="font-style:italic;">i</button>
            <button class="toolbar-btn" data-tb="quote">"</button>
            <button class="toolbar-btn" data-tb="list">≡</button>
            <button class="toolbar-btn" data-tb="link">${icon('link')}</button>
            <button class="toolbar-btn" id="insert-cta-btn" title="Insert button">▭</button>
            <button class="toolbar-btn" id="insert-tag-btn">{name}</button>
            <span class="toolbar-note">Brand header + footer auto-applied</span>
          </div>
          <div class="body-editable" id="body-editable" contenteditable="true">${d.bodyHtml || ''}</div>
          <div class="compliance-note">${icon('info')} A one-click unsubscribe link is added to the footer automatically to stay CAN-SPAM compliant.</div>
        </div>
        <div class="compose-col-right">
          ${this.emailPreviewHtml(d.subject, d.bodyHtml)}
        </div>
      </div>`;
  }

  // ---------- rink editor drawer ----------
  renderEditor() {
    const s = this.state;
    const drawer = document.getElementById('editor-drawer');
    const scrim = document.getElementById('editor-scrim');
    const open = s.editRinkId != null && s.rinkDraft;
    drawer.classList.toggle('open', open);
    scrim.classList.toggle('open', open);
    if (!open) { drawer.innerHTML = ''; return; }

    const d = s.rinkDraft;
    const typeOpts = Object.keys(TYPE_INFO).map(t => {
      const info = TYPE_INFO[t];
      const active = d.type === t;
      const style = active ? `border-color:${info.color};background:${info.bg};color:${info.color};` : '';
      return `<button class="type-opt" data-type-opt="${t}" style="${style}">${info.label}</button>`;
    }).join('');

    const dayRows = DAYS.map(day => `
      <div class="day-row">
        <span class="day-label">${day}</span>
        <input class="day-input" data-day="${day}" value="${esc(d.hours[day] || '')}" placeholder="6:00a–11:00p">
        <button class="day-closed-btn" data-day-closed="${day}">Closed</button>
      </div>`).join('');

    drawer.innerHTML = `
      <div class="editor-head">
        <div style="min-width:0;">
          <div class="editor-eyebrow">Edit rink</div>
          <div class="editor-name">${esc(d.name)}</div>
        </div>
        <button class="editor-close" id="editor-close-btn" aria-label="Close">${icon('x')}</button>
      </div>
      <div class="editor-body">
        <div class="section-label" style="margin-top:0;">Details</div>
        <label class="field-label">Rink type</label>
        <div class="type-seg">${typeOpts}</div>
        <label class="field-label">Phone</label>
        <input class="field-input" id="draft-phone" value="${esc(d.phone || '')}" placeholder="(000) 000-0000">
        <label class="field-label">Address</label>
        <textarea class="field-textarea" id="draft-address" rows="2" placeholder="Street, city, state ZIP">${esc(d.address || '')}</textarea>
        <div class="section-label">Hours</div>
        <div>${dayRows}</div>
        <div class="section-label">Amenities</div>
        <textarea class="field-textarea" id="draft-amenities" rows="3" placeholder="Pro Shop, Skate Rental, Concessions…">${esc((d.amenities || []).join(', '))}</textarea>
        <div class="section-label">Rink Admins</div>
        ${this.rinkAdminsHtml()}
      </div>
      <div class="editor-footer">
        <button class="btn-cancel" id="editor-cancel-btn">Cancel</button>
        <button class="btn-save" id="editor-save-btn">Save changes</button>
      </div>`;

    document.getElementById('editor-close-btn').addEventListener('click', () => this.closeEditor());
    document.getElementById('editor-cancel-btn').addEventListener('click', () => this.closeEditor());
    scrim.onclick = () => this.closeEditor();
    document.getElementById('editor-save-btn').addEventListener('click', () => this.saveRink());
    document.getElementById('draft-phone').addEventListener('input', (e) => this.updateDraft('phone', e.target.value));
    document.getElementById('draft-address').addEventListener('input', (e) => this.updateDraft('address', e.target.value));
    document.getElementById('draft-amenities').addEventListener('input', (e) => this.updateDraftAmenities(e.target.value));
    document.querySelectorAll('[data-type-opt]').forEach(b => b.addEventListener('click', () => this.updateDraft('type', b.dataset.typeOpt)));
    document.querySelectorAll('[data-day]').forEach(inp => inp.addEventListener('input', (e) => this.updateDraftHour(inp.dataset.day, e.target.value)));
    document.querySelectorAll('[data-day-closed]').forEach(b => b.addEventListener('click', () => {
      this.state.rinkDraft.hours[b.dataset.dayClosed] = 'Closed';
      this.render();
    }));

    const adminEmailInput = document.getElementById('rink-admin-email-input');
    adminEmailInput.addEventListener('input', (e) => { this.state.rinkAdminEmailInput = e.target.value; });
    adminEmailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') this.addRinkAdmin(); });
    document.getElementById('rink-admin-add-btn').addEventListener('click', () => this.addRinkAdmin());
    document.querySelectorAll('[data-remove-rink-admin]').forEach(b => b.addEventListener('click', () => this.removeRinkAdmin(Number(b.dataset.removeRinkAdmin))));
  }

  rinkAdminsHtml() {
    const admins = this.state.rinkAdmins;
    const rows = admins.length
      ? admins.map(a => `
        <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--hair);">
          <div style="min-width:0;flex:1;">
            <div style="font-size:12.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(a.name)}</div>
            <div style="font-size:11px;color:#656C84;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(a.email)}</div>
          </div>
          <button data-remove-rink-admin="${a.id}" style="width:30px;height:30px;border-radius:8px;background:transparent;border:1px solid var(--border);color:#656C84;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;" aria-label="Remove">${icon('x')}</button>
        </div>`).join('')
      : `<div style="font-size:12.5px;color:#656C84;padding:6px 0 10px;">No rink admins yet — grant access below.</div>`;

    return `
      <div style="margin-bottom:10px;">${rows}</div>
      <div style="display:flex;gap:8px;margin-bottom:${this.state.rinkAdminError ? '6px' : '16px'};">
        <input class="field-input" id="rink-admin-email-input" style="margin-bottom:0;" value="${esc(this.state.rinkAdminEmailInput)}" placeholder="owner@email.com" type="email">
        <button id="rink-admin-add-btn" style="flex-shrink:0;height:40px;padding:0 16px;border-radius:9px;background:var(--color-primary);border:none;color:#06181A;font-size:13px;font-weight:700;">Add</button>
      </div>
      ${this.state.rinkAdminError ? `<div style="font-size:12px;color:#FF6B7D;margin-bottom:16px;">${esc(this.state.rinkAdminError)}</div>` : ''}`;
  }

  // ---------- modals ----------
  renderModals() {
    const root = document.getElementById('modal-root');
    const s = this.state;

    if (s.rejectForId != null) {
      root.innerHTML = this.rejectModalHtml();
      document.getElementById('reject-scrim').addEventListener('click', (e) => { if (e.target.id === 'reject-scrim') this.closeReject(); });
      document.getElementById('reject-cancel-btn').addEventListener('click', () => this.closeReject());
      document.getElementById('reject-confirm-btn').addEventListener('click', () => this.confirmReject());
      const textarea = document.getElementById('reject-reason-input');
      textarea.addEventListener('input', (e) => { this.state.rejectReason = e.target.value; this.updateRejectConfirmState(); });
      document.querySelectorAll('[data-reason-chip]').forEach(chip => chip.addEventListener('click', () => {
        textarea.value = chip.dataset.reasonChip;
        this.state.rejectReason = chip.dataset.reasonChip;
        this.updateRejectConfirmState();
      }));
      return;
    }

    if (s.photoModalId != null) {
      root.innerHTML = this.photoModalHtml();
      document.getElementById('photo-scrim').addEventListener('click', (e) => { if (e.target.id === 'photo-scrim') this.closePhotoModal(); });
      document.getElementById('photo-modal-close-btn').addEventListener('click', () => this.closePhotoModal());
      const approveBtn = document.getElementById('photo-modal-approve');
      if (approveBtn) approveBtn.addEventListener('click', () => this.approvePhoto(s.photoModalId));
      const rejectBtn = document.getElementById('photo-modal-reject');
      if (rejectBtn) rejectBtn.addEventListener('click', () => { this.closePhotoModal(); this.openReject(s.photoModalId); });
      return;
    }

    if (s.campaignModal === 'new') {
      root.innerHTML = this.newCampaignModalHtml();
      document.getElementById('new-camp-scrim').addEventListener('click', (e) => { if (e.target.id === 'new-camp-scrim') this.closeCampaignModal(); });
      document.getElementById('new-camp-close-btn').addEventListener('click', () => this.closeCampaignModal());
      document.getElementById('pick-broadcast-btn').addEventListener('click', () => this.pickBroadcast());
      document.getElementById('pick-automation-btn').addEventListener('click', () => this.pickAutomation());
      return;
    }

    if (s.campaignModal === 'send') {
      root.innerHTML = this.sendConfirmModalHtml();
      document.getElementById('send-confirm-scrim').addEventListener('click', (e) => { if (e.target.id === 'send-confirm-scrim') this.closeCampaignModal(); });
      document.getElementById('send-confirm-cancel-btn').addEventListener('click', () => this.closeCampaignModal());
      document.getElementById('send-confirm-btn').addEventListener('click', () => this.confirmSend());
      return;
    }

    if (s.campaignModal === 'schedule') {
      root.innerHTML = this.scheduleModalHtml();
      document.getElementById('schedule-scrim').addEventListener('click', (e) => { if (e.target.id === 'schedule-scrim') this.closeCampaignModal(); });
      document.getElementById('schedule-cancel-btn').addEventListener('click', () => this.closeCampaignModal());
      document.getElementById('schedule-confirm-btn').addEventListener('click', () => this.confirmSchedule());
      document.getElementById('schedule-at-input').addEventListener('input', (e) => { this.state.campaignScheduleAt = e.target.value; });
      return;
    }

    root.innerHTML = '';
  }

  newCampaignModalHtml() {
    return `
      <div class="modal-scrim" id="new-camp-scrim">
        <div class="reject-modal" style="width:560px;">
          <div style="display:flex;align-items:flex-start;">
            <div>
              <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);">New campaign</div>
              <div style="font-size:12.5px;color:#888FA8;margin-top:3px;">Pick how this email should send.</div>
            </div>
            <button class="editor-close" style="margin-left:auto;" id="new-camp-close-btn">${icon('x')}</button>
          </div>
          <div class="pick-cards">
            <button class="pick-card" id="pick-broadcast-btn">
              <div class="pick-card-icon" style="background:rgba(20,207,207,0.12);color:#14CFCF;">${icon('send')}</div>
              <div class="pick-card-title">Broadcast</div>
              <div class="pick-card-desc">A one-time email to a filtered audience — feature releases, events, announcements.</div>
            </button>
            <button class="pick-card" id="pick-automation-btn">
              <div class="pick-card-icon" style="background:rgba(52,224,160,0.12);color:#34E0A0;">${icon('zap')}</div>
              <div class="pick-card-title">Automation</div>
              <div class="pick-card-desc">A sequence that sends on a trigger — open the Welcome Series to edit it.</div>
            </button>
          </div>
        </div>
      </div>`;
  }

  sendConfirmModalHtml() {
    const reach = this.state.campaignReach != null ? this.state.campaignReach : (this.state.broadcastDraft ? this.state.broadcastDraft.reach : 0);
    return `
      <div class="modal-scrim" id="send-confirm-scrim">
        <div class="send-confirm-modal">
          <div style="color:#14CFCF;display:flex;justify-content:center;margin-bottom:14px;font-size:28px;">${icon('send')}</div>
          <div style="font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--text);">Send this broadcast?</div>
          <div style="font-size:13px;color:#888FA8;margin-top:8px;line-height:1.5;">It will go to <strong style="color:var(--text);">${reach.toLocaleString()}</strong> members immediately. This can't be undone.</div>
          <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn-cancel" id="send-confirm-cancel-btn">Cancel</button>
            <button class="btn-primary" style="flex:1.6;justify-content:center;" id="send-confirm-btn">Send now</button>
          </div>
        </div>
      </div>`;
  }

  scheduleModalHtml() {
    return `
      <div class="modal-scrim" id="schedule-scrim">
        <div class="reject-modal">
          <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;">Schedule this broadcast</div>
          <label class="field-label">Send date &amp; time</label>
          <input class="field-input" type="datetime-local" id="schedule-at-input" value="${esc(this.state.campaignScheduleAt)}">
          <div style="display:flex;gap:10px;margin-top:4px;">
            <button class="btn-cancel" id="schedule-cancel-btn">Cancel</button>
            <button class="btn-primary" style="flex:1.6;justify-content:center;" id="schedule-confirm-btn">Schedule</button>
          </div>
        </div>
      </div>`;
  }

  updateRejectConfirmState() {
    const btn = document.getElementById('reject-confirm-btn');
    const has = this.state.rejectReason.trim().length > 0;
    btn.disabled = !has;
    btn.style.cssText = has
      ? 'flex:1;height:42px;border-radius:9px;font-size:13.5px;font-weight:700;background:#FF6B7D;border:none;color:#06181A;'
      : 'flex:1;height:42px;border-radius:9px;font-size:13.5px;font-weight:700;background:#2A2331;border:none;color:#656C84;cursor:not-allowed;';
  }

  rejectModalHtml() {
    const s = this.state;
    const photo = [...s.photos, ...(s.overview ? s.overview.pendingPreview : [])].find(p => p.id === s.rejectForId);
    const chips = REASON_CHIPS.map(c => `<button class="reason-chip" data-reason-chip="${esc(c)}">${esc(c)}</button>`).join('');
    return `
      <div class="modal-scrim" id="reject-scrim">
        <div class="reject-modal">
          <div style="display:flex;gap:13px;align-items:center;margin-bottom:16px;">
            <div style="width:56px;height:56px;border-radius:10px;background-size:cover;background-position:center;background-color:#0E1322;border:1px solid var(--border);flex-shrink:0;background-image:url('/api/admin/photos/${s.rejectForId}/image');"></div>
            <div style="min-width:0;">
              <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);">Reject submission</div>
              <div style="font-size:12.5px;color:#888FA8;margin-top:2px;">${photo ? esc(photo.rinkName) + ' · by ' + esc(photo.submitterName) : ''}</div>
            </div>
          </div>
          <label class="field-label">Reason (shared with submitter)</label>
          <div class="reason-chips">${chips}</div>
          <textarea class="field-textarea" id="reject-reason-input" rows="3" placeholder="Add a short reason…">${esc(s.rejectReason)}</textarea>
          <div style="display:flex;gap:10px;margin-top:18px;">
            <button class="btn-cancel" id="reject-cancel-btn">Cancel</button>
            <button id="reject-confirm-btn" disabled style="flex:1;height:42px;border-radius:9px;font-size:13.5px;font-weight:700;background:#2A2331;border:none;color:#656C84;cursor:not-allowed;">Reject photo</button>
          </div>
        </div>
      </div>`;
  }

  photoModalHtml() {
    const s = this.state;
    const inQueue = s.photos.find(p => p.id === s.photoModalId);
    const inOverview = s.overview ? s.overview.pendingPreview.find(p => p.id === s.photoModalId) : null;
    const photo = inQueue || inOverview;
    if (!photo) return '';
    const info = TYPE_INFO[photo.rinkType] || TYPE_INFO.STANDARD;
    // pendingPreview only ever holds pending photos; when the modal was
    // opened from the Photo Queue itself, trust the active tab instead —
    // serialize_admin_photo() doesn't echo a status field back.
    const isPending = inQueue ? s.photoFilter === 'pending' : true;
    const actions = isPending
      ? `<div style="display:flex;gap:11px;">
          <button id="photo-modal-approve" style="flex:1;height:44px;border-radius:9px;background:#34E0A0;border:none;color:#06181A;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;">${icon('check')}Approve</button>
          <button id="photo-modal-reject" style="flex:1;height:44px;border-radius:9px;background:transparent;border:1px solid rgba(255,107,125,0.4);color:#FF6B7D;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;">${icon('x')}Reject</button>
        </div>`
      : `<div class="status-pill" style="height:44px;">${icon('check')}Published</div>`;

    return `
      <div class="modal-scrim" id="photo-scrim">
        <div class="photo-modal">
          <div class="photo-modal-hero" style="background-image:url('/api/admin/photos/${photo.id}/image');">
            <button class="photo-modal-close" id="photo-modal-close-btn" aria-label="Close">${icon('x')}</button>
            <span class="type-badge thumb-badge" style="background:${info.bg};border:1px solid ${info.color}40;color:${info.color};">${info.label}</span>
          </div>
          <div style="padding:18px 20px 20px;">
            <div style="font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--text);">${esc(photo.rinkName)}</div>
            <div style="font-size:13px;color:#888FA8;margin-top:3px;">${esc(photo.rinkCity)}, ${esc(photo.rinkState)}</div>
            <div class="meta-strip">
              <div><div class="meta-eyebrow">Submitter</div><div style="font-size:13.5px;color:var(--text);margin-top:4px;">${esc(photo.submitterName)}</div></div>
              <div><div class="meta-eyebrow">Submitted</div><div style="font-size:13.5px;color:var(--text);margin-top:4px;">${relTime(photo.submittedAt)}</div></div>
            </div>
            ${actions}
          </div>
        </div>
      </div>`;
  }

  renderToast() {
    const el = document.getElementById('toast');
    const t = this.state.toast;
    if (!t) { el.classList.remove('show'); return; }
    el.innerHTML = `<span style="font-size:16px;display:flex;color:${t.color};">${icon(t.icon)}</span><span style="font-size:13.5px;color:var(--text);">${esc(t.text)}</span>`;
    requestAnimationFrame(() => el.classList.add('show'));
  }
}

const app = new Admin();
</script>
</body>
</html>
